    <!-- Version-stamped imports. Browsers (and CDNs) cache by URL, so

    <!-- Boot integrity guard (0.39.1). A PWA mid-update can fetch the new
         index.html while one of the version-stamped scripts above fails to
         download (flaky mobile network; the old service worker's cache
         can't serve the new URLs). The app then half-boots: screens render
         until they touch the missing module, and the sim halts mid-day
         with a confusing error. Verify every module registered; if any
         are missing, retry the load once automatically, then say plainly
         what happened instead of limping. Inline so it can never itself
         be the script that fails to arrive. -->
    <script>
    (function () {
      var REQUIRED_MODULES = ['BBGM_CONSTANTS', 'BBGM_NAMES', 'BBGM_INTL_NAMES',
        'BBGM_CITIES', 'BBGM_TEAMS', 'BBGM_RNG', 'BBGM_DATES', 'BBGM_STATE',
        'BBGM_BALLPARKS', 'BBGM_LEAGUE_GEN', 'BBGM_PLAYER_GEN', 'BBGM_SCHEDULE',
        'BBGM_STATS', 'BBGM_INJURIES', 'BBGM_FATIGUE', 'BBGM_ROSTER',
        'BBGM_PROGRESSION', 'BBGM_MINORS', 'BBGM_FLAVOR', 'BBGM_TRADES', 'BBGM_FA',
        'BBGM_WAIVERS', 'BBGM_INBOX', 'BBGM_STAFF', 'BBGM_SCOUT', 'BBGM_DRAFT',
        'BBGM_INTL', 'BBGM_AWARDS', 'BBGM_SIM', 'BBGM_STANDINGS',
        'BBGM_OFFSEASON', 'BBGM_UI', 'BBGM_UI_DASHBOARD', 'BBGM_UI_TEAM',
        'BBGM_UI_LEAGUE', 'BBGM_UI_PLAYERS', 'BBGM_UI_GAMES',
        'BBGM_UI_FRONTOFFICE', 'BBGM_UI_GM', 'BBGM_UI_DRAFT', 'BBGM_UI_MENU',
        'BBGM_UI_PLAYER', 'BBGM_MAIN'];
      var missing = [];
      for (var i = 0; i < REQUIRED_MODULES.length; i++) {
        if (!window[REQUIRED_MODULES[i]]) missing.push(REQUIRED_MODULES[i]);
      }
      if (!missing.length) {
        window.__BBGM_BOOT_OK = true;
        try { sessionStorage.removeItem('bbgm-boot-retry'); } catch (e) {}
        // Strip the URL fallback marker so a future failure still gets
        // its one automatic retry.
        if (/(^|[?&])bbgmretry=1(&|$)/.test(location.search)) {
          try { history.replaceState(null, '', location.pathname); } catch (e) {}
        }
        return;
      }
      console.error('BBGM boot incomplete — missing modules:', missing.join(', '));
      // Retry marker lives in sessionStorage, with the URL query as the
      // fallback (0.46.0): with storage access blocked ("Block all
      // cookies" and some privacy webviews) BOTH storage calls throw
      // silently, the marker never stuck, and a permanently missing file
      // meant an infinite reload storm instead of this error screen.
      var retried = /(^|[?&])bbgmretry=1(&|$)/.test(location.search);
      try { retried = retried || !!sessionStorage.getItem('bbgm-boot-retry'); } catch (e) {}
      if (!retried) {
        var stored = false;
        try { sessionStorage.setItem('bbgm-boot-retry', '1'); stored = true; } catch (e) {}
        if (stored) {
          location.reload();
        } else {
          location.replace(location.pathname + '?bbgmretry=1');
        }
        return;
      }
      // Second failed boot in a row: stop and say so. The save is untouched.
      document.body.innerHTML =
        '<div style="max-width:420px;margin:80px auto;padding:24px;font-family:sans-serif;' +
        'color:#e6edf3;background:#161b22;border-radius:12px;line-height:1.5">' +
        '<h2 style="margin:0 0 10px;font-size:18px">Update didn\'t finish downloading</h2>' +
        '<p style="margin:0 0 8px;font-size:14px">Part of the game failed to load ' +
        '(' + missing.length + ' of ' + REQUIRED_MODULES.length + ' modules missing). ' +
        'This happens on a spotty connection during an app update. Your save is safe.</p>' +
        '<p style="margin:0 0 16px;font-size:14px">Check your connection and reload.</p>' +
        '<button onclick="try{sessionStorage.removeItem(\'bbgm-boot-retry\')}catch(e){};location.reload()" ' +
        'style="padding:10px 18px;font-size:15px;border:none;border-radius:8px;' +
        'background:#c9302c;color:#fff;font-weight:600">Reload</button></div>';
    })();
    </script>
