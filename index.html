<body>
    <div id="splash" class="splash">
        <div class="splash-inner">
            <div class="splash-logo">⚾</div>
            <h1>Baseball GM Classic</h1>
            <p class="tagline">Modern framework, classic baseball.</p>
            <div class="splash-buttons">

                <button id="btnLoadGame" class="btn-secondary">Continue</button>
                <button id="btnImportGame" class="btn-tertiary">Import Save</button>

            </div>
            <p class="version">v0.41.0</p>

    </div>

    <div id="teamSelect" class="screen hidden">
        <header class="screen-header">
            <h2>Choose Your Team</h2>
            <p class="screen-sub">The NABL has 30 fixed clubs. Rosters and league conditions are generated each save.</p>
        </header>
        <div id="teamSelectList" class="team-select-list"></div>
        <div class="bottom-actions">
            <button id="btnRegenerate" class="btn-secondary">Generate New Rosters</button>

    </div>

    <div id="app" class="app hidden">
        <header class="app-header">
            <div class="app-header-left">

                <span id="hdrRecord" class="hdr-record">0-0</span>
            </div>
            <div class="app-header-center">
                <button id="btnAdvance" class="btn-advance">Advance Day ▶</button>
            </div>
            <div style="display:flex;align-items:center;gap:2px">
                <button id="btnInbox" class="hdr-menu-btn" aria-label="Inbox" style="position:relative">✉<span id="inboxBadge" style="display:none;position:absolute;top:2px;right:0;background:#e25c5c;color:#fff;border-radius:8px;font-size:10px;line-height:1;padding:2px 5px;font-weight:700"></span></button>
                <button id="btnMenu" class="hdr-menu-btn" aria-label="Menu">≡</button>
            </div>
        </header>

        <main id="mainView" class="main-view">
            <!-- Dynamic content -->
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-tab="home">
                <span class="nav-icon">⌂</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-btn" data-tab="team">
                <span class="nav-icon">●</span>
                <span class="nav-label">Team</span>
            </button>
            <button class="nav-btn" data-tab="league">
                <span class="nav-icon">⊞</span>
                <span class="nav-label">League</span>
            </button>
            <button class="nav-btn" data-tab="players">
                <span class="nav-icon">◎</span>
                <span class="nav-label">Players</span>
            </button>
            <button class="nav-btn" data-tab="draft">
                <span class="nav-icon">✪</span>
                <span class="nav-label">Draft</span>
            </button>
            <button class="nav-btn" data-tab="gm">
                <span class="nav-icon">$</span>
                <span class="nav-label">GM</span>
            </button>
        </nav>
    </div>

    <div id="modalRoot" class="modal-root hidden"></div>
    <div id="toastRoot" class="toast-root"></div>
    <div id="progressRoot" class="progress-root hidden">
        <div class="progress-card">
            <div class="progress-spinner"></div>
            <div id="progressText" class="progress-text">Working…</div>
        </div>
    </div>

    <!-- Version-stamped script imports. Browsers (and CDNs) cache JS by URL,

    <!-- Boot integrity guard (0.39.1). A PWA mid-update can fetch the new
         index.html while one of the version-stamped scripts above fails to
         download (flaky mobile network; the old service worker's cache
         can't serve the new URLs). The app then half-boots: screens render
         until they touch the missing module, and the sim halts mid-day
         with a confusing error. Verify every module registered; if any
         are missing, retry the load once automatically, then say plainly
         what happened instead of limping. Inline so it can never itself
         be the script that fails to arrive. -->
    <script>
    (function () {
      var REQUIRED_MODULES = ['BBGM_CONSTANTS', 'BBGM_NAMES', 'BBGM_INTL_NAMES',
        'BBGM_CITIES', 'BBGM_TEAMS', 'BBGM_RNG', 'BBGM_DATES', 'BBGM_STATE',
        'BBGM_BALLPARKS', 'BBGM_LEAGUE_GEN', 'BBGM_PLAYER_GEN', 'BBGM_SCHEDULE',
        'BBGM_STATS', 'BBGM_INJURIES', 'BBGM_FATIGUE', 'BBGM_ROSTER',
        'BBGM_PROGRESSION', 'BBGM_MINORS', 'BBGM_FLAVOR', 'BBGM_TRADES', 'BBGM_FA',
        'BBGM_WAIVERS', 'BBGM_INBOX', 'BBGM_STAFF', 'BBGM_SCOUT', 'BBGM_DRAFT',
        'BBGM_INTL', 'BBGM_AWARDS', 'BBGM_SIM', 'BBGM_STANDINGS',
        'BBGM_OFFSEASON', 'BBGM_UI', 'BBGM_UI_DASHBOARD', 'BBGM_UI_TEAM',
        'BBGM_UI_LEAGUE', 'BBGM_UI_PLAYERS', 'BBGM_UI_GAMES',
        'BBGM_UI_FRONTOFFICE', 'BBGM_UI_GM', 'BBGM_UI_DRAFT', 'BBGM_UI_MENU',
        'BBGM_UI_PLAYER', 'BBGM_MAIN'];
      var missing = [];
      for (var i = 0; i < REQUIRED_MODULES.length; i++) {
        if (!window[REQUIRED_MODULES[i]]) missing.push(REQUIRED_MODULES[i]);
      }
      if (!missing.length) {
        window.__BBGM_BOOT_OK = true;
        try { sessionStorage.removeItem('bbgm-boot-retry'); } catch (e) {}
        return;
      }
      console.error('BBGM boot incomplete — missing modules:', missing.join(', '));
      var retried = false;
      try { retried = !!sessionStorage.getItem('bbgm-boot-retry'); } catch (e) {}
      if (!retried) {
        try { sessionStorage.setItem('bbgm-boot-retry', '1'); } catch (e) {}
        location.reload();
        return;
      }
      // Second failed boot in a row: stop and say so. The save is untouched.
      document.body.innerHTML =
        '<div style="max-width:420px;margin:80px auto;padding:24px;font-family:sans-serif;' +
        'color:#e6edf3;background:#161b22;border-radius:12px;line-height:1.5">' +
        '<h2 style="margin:0 0 10px;font-size:18px">Update didn\'t finish downloading</h2>' +
        '<p style="margin:0 0 8px;font-size:14px">Part of the game failed to load ' +
        '(' + missing.length + ' of ' + REQUIRED_MODULES.length + ' modules missing). ' +
        'This happens on a spotty connection during an app update. Your save is safe.</p>' +
        '<p style="margin:0 0 16px;font-size:14px">Check your connection and reload.</p>' +
        '<button onclick="try{sessionStorage.removeItem(\'bbgm-boot-retry\')}catch(e){};location.reload()" ' +
        'style="padding:10px 18px;font-size:15px;border:none;border-radius:8px;' +
        'background:#c9302c;color:#fff;font-weight:600">Reload</button></div>';
    })();
    </script>
</body>
</html>
